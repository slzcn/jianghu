<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>江湖 · 多人</title>
<link rel="preconnect" href="https://cddkniwbhvcbfgkgomtl.supabase.co" crossorigin>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --ink:#1a1613; --paper:#e8ddc7; --paper2:#ddceb0; --paper3:#f0e8d6;
    --sub:#6b5d47; --dim:#98876a; --red:#a8321e; --red-d:#7c2415;
    --gold:#9a7b3f; --jade:#4a7c59; --blue:#3a6b8c;
    --line:rgba(60,45,30,.22); --line2:rgba(60,45,30,.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior:none}
  body{font-family:"Kaiti SC","STKaiti","KaiTi","Songti SC","SimSun",serif;
    background:var(--paper);color:var(--ink);font-size:15px;min-height:100vh;min-height:100dvh;
    -webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;line-height:1.7}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background:radial-gradient(ellipse 90% 70% at 50% 40%,transparent 55%,rgba(60,40,20,.18) 100%),
      repeating-linear-gradient(0deg,rgba(120,90,50,.025) 0 2px,transparent 2px 4px);}
  body::after{content:"";position:fixed;left:0;right:0;bottom:0;height:34vh;z-index:0;pointer-events:none;opacity:.12;
    background:radial-gradient(ellipse 45% 100% at 18% 100%,var(--ink),transparent 62%),
      radial-gradient(ellipse 55% 120% at 52% 100%,var(--ink),transparent 58%),
      radial-gradient(ellipse 45% 90% at 85% 100%,var(--ink),transparent 60%);}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 30px;position:relative;z-index:1;min-height:100dvh}

  .seal{display:inline-block;background:var(--red);color:var(--paper3);font-weight:700;padding:2px 6px;border-radius:4px;font-size:11px;letter-spacing:1px}
  .brush-title{font-size:30px;font-weight:700;letter-spacing:5px;position:relative;display:inline-block}
  .brush-title::after{content:"";position:absolute;left:-4px;right:-4px;bottom:-3px;height:3px;background:linear-gradient(90deg,transparent,var(--ink) 20%,var(--ink) 80%,transparent);opacity:.55}
  .scroll-card{background:linear-gradient(180deg,var(--paper3),var(--paper2));border:1px solid var(--line2);border-radius:6px;padding:14px;position:relative;box-shadow:0 3px 12px -6px rgba(40,25,10,.4)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;
    padding:11px 18px;border-radius:5px;border:1px solid var(--line2);color:var(--ink);background:linear-gradient(180deg,var(--paper3),var(--paper2));transition:.15s;user-select:none}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px -5px rgba(40,25,10,.5);border-color:var(--red)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:linear-gradient(180deg,var(--red),var(--red-d));color:var(--paper3);border-color:var(--red-d)}
  .btn.ghost{background:transparent} .btn.wide{width:100%} .btn.sm{padding:7px 12px;font-size:13px}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  input.ipt{width:100%;padding:11px 13px;border:1px solid var(--line2);border-radius:5px;background:var(--paper3);color:var(--ink);font-family:inherit;font-size:16px;outline:none}
  input.ipt:focus{border-color:var(--red)}
  .scene{display:none;animation:inkin .5s ease} .scene.on{display:block}
  @keyframes inkin{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}
  .tiny{font-size:11.5px;color:var(--dim)} .center{text-align:center}
  .mt{margin-top:14px} .mt2{margin-top:22px}

  /* 入场 */
  #enter{text-align:center;padding-top:11vh}
  .ink-splash{font-size:60px;margin-bottom:4px;filter:drop-shadow(2px 3px 2px rgba(40,25,10,.3))}
  #enter .sub{color:var(--sub);margin:12px 0;letter-spacing:3px;font-size:14px}
  #enter .poem{color:var(--dim);font-size:13px;line-height:2;margin:16px 0 30px}
  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{padding:11px 12px;border:1px solid var(--line2);border-radius:5px;cursor:pointer;transition:.15s;background:var(--paper3);text-align:left}
  .opt.sel{border-color:var(--red);background:linear-gradient(180deg,#f3e9d3,#eaddc0);box-shadow:inset 0 0 0 1px var(--red)}
  .opt .o-nm{font-weight:700;font-size:15px} .opt .o-tag{font-size:11.5px;color:var(--dim);margin-top:3px;line-height:1.5}
  .field{margin:15px 0} .field-label{font-size:13px;color:var(--sub);letter-spacing:2px;margin-bottom:8px}

  /* 顶栏 */
  .top-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .me-chip{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  .me-av{width:40px;height:40px;border-radius:7px;display:grid;place-items:center;font-size:22px;flex-shrink:0;background:linear-gradient(180deg,var(--paper3),var(--paper2));border:1px solid var(--line2)}
  .me-name{font-weight:700;font-size:16px} .me-name .t{font-size:11px;color:var(--red);margin-left:5px}
  .me-meta{font-size:11.5px;color:var(--sub)}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0}
  .conn-dot.live{background:var(--jade);box-shadow:0 0 6px var(--jade)}

  /* 门派分厅切换 */
  .ops-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px}
  .ops-bar .op{flex-shrink:0;padding:6px 11px;border-radius:6px;border:1px solid var(--line2);background:var(--paper3);cursor:pointer;font-size:12.5px;white-space:nowrap;transition:.14s}
  .ops-bar .op:hover{border-color:var(--red);color:var(--red)}
  .ops-bar .op.active{background:var(--jade);color:var(--paper3);border-color:var(--jade)}
  /* 打坐 */
  .meditate-box{text-align:center;padding:10px}
  .meditate-orb{font-size:56px;display:inline-block;animation:medBreath 3s ease-in-out infinite}
  @keyframes medBreath{0%,100%{transform:scale(1);filter:drop-shadow(0 0 4px rgba(74,124,89,.4))}50%{transform:scale(1.08);filter:drop-shadow(0 0 16px rgba(74,124,89,.8))}}
  .med-gain{font-size:13px;color:var(--jade);margin-top:8px}
  .sect-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px}
  .sect-tab{flex-shrink:0;padding:7px 13px;border-radius:16px;border:1px solid var(--line2);background:var(--paper3);cursor:pointer;font-size:13px;white-space:nowrap;transition:.14s}
  .sect-tab.on{background:var(--red);color:var(--paper3);border-color:var(--red-d)}

  /* 在线群侠(江湖榜) */
  .heroes{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;margin-bottom:6px}
  .hero-pav{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;cursor:pointer}
  .hero-pav .hp-av{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(180deg,var(--paper3),var(--paper2));border:1px solid var(--line2);position:relative;transition:.15s}
  .hero-pav:hover .hp-av{border-color:var(--red);transform:translateY(-2px)}
  .hero-pav.me .hp-av{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .hero-pav .hp-nm{font-size:10px;color:var(--sub);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
  .hp-bot{position:absolute;right:-2px;bottom:-2px;font-size:8px;background:var(--jade);color:var(--paper3);border-radius:4px;padding:0 3px;line-height:1.4}

  /* 传音消息流 */
  .chat{background:var(--paper3);border:1px solid var(--line);border-radius:6px;padding:10px 12px;min-height:38vh;max-height:52vh;overflow-y:auto;margin-bottom:10px}
  .msg{margin-bottom:9px;display:flex;gap:8px;align-items:flex-start}
  .msg.me{flex-direction:row-reverse;text-align:right}
  .msg .m-av{width:30px;height:30px;border-radius:6px;display:grid;place-items:center;font-size:16px;flex-shrink:0;background:var(--paper);border:1px solid var(--line)}
  .msg .m-body{max-width:78%}
  .msg .m-nm{font-size:11px;color:var(--sub);margin-bottom:1px}
  .msg .m-nm .bot{color:var(--jade);font-size:9px;margin-left:3px}
  .msg .m-txt{background:var(--paper);border:1px solid var(--line);border-radius:4px 9px 9px 9px;padding:6px 10px;font-size:14px;line-height:1.5;display:inline-block;word-break:break-word}
  .msg.me .m-txt{border-radius:9px 4px 9px 9px;background:linear-gradient(180deg,#f3e6cd,#ecdcbc)}
  .msg.sys{justify-content:center}
  .msg.sys .m-txt{background:none;border:none;color:var(--dim);font-size:12px;padding:2px}

  /* 传音输入 */
  .composer{display:flex;gap:8px;align-items:flex-end}
  .composer .ipt{flex:1}

  /* 战书/PK 弹层 */
  .modal-mask{position:fixed;inset:0;z-index:120;background:rgba(30,20,10,.55);display:none;align-items:center;justify-content:center;padding:20px}
  .modal-mask.on{display:flex;animation:inkin .3s}
  .modal{width:min(440px,94vw);max-height:88vh;overflow-y:auto}

  /* 战斗界面(第三批用) */
  #toast{position:fixed;left:50%;bottom:60px;transform:translateX(-50%) translateY(20px);z-index:200;background:var(--ink);color:var(--paper3);padding:9px 18px;border-radius:6px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;max-width:80vw;text-align:center}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .page-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .page-head .back{cursor:pointer;font-size:20px;color:var(--sub)} .page-head .back:hover{color:var(--red)}
  .page-head h2{font-size:19px;font-weight:700;letter-spacing:2px}

  /* ===== PK 战斗 ===== */
  .combatant{background:var(--paper3);border:1px solid var(--line2);border-radius:6px;padding:11px 13px;margin-bottom:10px;transition:.12s}
  .combatant.hurt{animation:cbHurt .3s}
  @keyframes cbHurt{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .cb-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .cb-av{width:36px;height:36px;border-radius:7px;display:grid;place-items:center;font-size:20px;flex-shrink:0;background:linear-gradient(180deg,var(--paper),var(--paper2));border:1px solid var(--line2)}
  .cb-nm{font-weight:700;font-size:15px}
  .cb-wait{margin-left:auto;font-size:12px;color:var(--sub)}
  .cb-wait.ready{color:var(--jade)}
  .bar{height:11px;border-radius:6px;background:rgba(60,45,30,.15);overflow:hidden;position:relative;margin-bottom:4px}
  .bar>i{display:block;height:100%;border-radius:6px;transition:width .35s cubic-bezier(.3,.8,.3,1)}
  .bar .bt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--paper3);text-shadow:0 0 2px rgba(0,0,0,.5)}
  .bar-hp>i{background:linear-gradient(90deg,var(--red-d),var(--red))}
  .bar-mp{height:7px}.bar-mp>i{background:linear-gradient(90deg,#2c5a7a,#4a86ad)}
  .bar-st{height:5px}.bar-st>i{background:linear-gradient(90deg,#b8863a,#e0b45a)}
  .moves{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .move{padding:10px 11px;border:1px solid var(--line2);border-radius:6px;cursor:pointer;transition:.14s;background:linear-gradient(180deg,var(--paper3),var(--paper2));text-align:left;position:relative}
  .move:hover:not(.disabled){border-color:var(--red);transform:translateY(-1px)}
  .move.disabled,.move.locked{opacity:.4;cursor:not-allowed}
  .move .mv-nm{font-weight:700;font-size:14px}
  .move .mv-sys{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:600}
  .sys-gang{background:rgba(168,50,30,.16);color:var(--red)} .sys-rou{background:rgba(74,124,89,.18);color:var(--jade)}
  .sys-ling{background:rgba(58,107,140,.16);color:var(--blue)} .sys-special{background:rgba(154,123,63,.2);color:var(--gold)}
  .move .mv-desc{font-size:10.5px;color:var(--dim);margin-top:3px;line-height:1.45}
  .move .mv-cost{position:absolute;top:9px;right:10px;font-size:10px;color:var(--blue)}
  .battle-log{background:var(--paper3);border:1px solid var(--line);border-radius:5px;padding:9px 12px;margin-top:12px;font-size:13px;line-height:1.7;min-height:48px;max-height:120px;overflow-y:auto}
  .bl-you{color:var(--red)} .bl-foe{color:var(--blue)} .bl-crit{color:var(--gold);font-weight:700} .bl-break{color:var(--red);font-weight:700}
  .waiting-tip{text-align:center;color:var(--sub);font-size:13px;padding:6px;font-style:italic}
  /* 特效 */
  #fx{position:fixed;inset:0;z-index:150;pointer-events:none;display:flex;align-items:center;justify-content:center}
  .fx-word{font-size:80px;font-weight:900;color:var(--red);opacity:0;text-shadow:0 0 20px rgba(168,50,30,.6),3px 4px 0 var(--red-d)}
  .fx-word.go{animation:fxWord .7s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes fxWord{0%{opacity:0;transform:scale(2.4) rotate(-8deg)}30%{opacity:1;transform:scale(1)}70%{opacity:1}100%{opacity:0}}
  .shake{animation:screenShake .3s}
  @keyframes screenShake{0%,100%{transform:none}25%{transform:translate(-4px,3px)}50%{transform:translate(5px,-2px)}75%{transform:translate(-3px,-3px)}}
  .battle-end{text-align:center;padding:20px 12px}
  .battle-end .be-title{font-size:26px;font-weight:800;letter-spacing:3px;margin-bottom:8px}
  .battle-end.win .be-title{color:var(--red)} .battle-end.lose .be-title{color:var(--sub)}
  .narrate{background:var(--paper3);border-left:3px solid var(--red);padding:11px 14px;border-radius:0 5px 5px 0;font-size:14px;line-height:1.8;margin:12px 0}
  .narrate .who{color:var(--red);font-weight:700}
</style>
</head>
<body>
<div class="wrap">

  <!-- 入场 -->
  <div class="scene on" id="enter">
    <div class="ink-splash">🏯</div>
    <div class="brush-title">江　湖</div>
    <div class="sub">众 侠 云 集 · 传 音 论 剑</div>
    <div class="poem">此地非一人之江湖。<br>与四方豪杰同处一世，传音、结派、切磋。</div>
    <div id="enterForm" style="text-align:left;max-width:420px;margin:0 auto">
      <div class="field"><div class="field-label">名号</div><input class="ipt" id="nameIpt" maxlength="8" placeholder="报上江湖名号"></div>
      <div class="field"><div class="field-label">立身之门</div><div class="opt-grid" id="sectGrid"></div></div>
      <div class="field"><div class="field-label">资质</div><div class="opt-grid" id="talentGrid"></div></div>
    </div>
    <button class="btn primary wide mt" id="startBtn">踏入江湖</button>
  </div>

  <!-- 江湖大厅 -->
  <div class="scene" id="hall">
    <div class="top-bar">
      <span class="conn-dot" id="connDot"></span>
      <div class="me-chip">
        <div class="me-av" id="meAv">🧑</div>
        <div style="min-width:0">
          <div class="me-name"><span id="meName">无名</span><span class="t" id="meTitle"></span></div>
          <div class="me-meta" id="meMeta"></div>
        </div>
      </div>
      <span class="btn sm ghost" id="rankBtn">威望榜</span>
    </div>
    <div class="ops-bar" id="opsBar">
      <span class="op" id="opMeditate">🧘 打坐</span>
      <span class="op" id="opArena">🥊 演武场</span>
      <span class="op" id="opShop">📖 书铺</span>
      <span class="op" id="opElixir">💊 丹药</span>
      <span class="op" id="opFeud">📜 恩怨</span>
      <span class="op" id="opMaster">👤 师徒</span>
    </div>
    <div class="sect-tabs" id="sectTabs"></div>
    <div class="tiny" style="margin:2px 0 4px;color:var(--sub)">在此地的群侠(点击可下战书)：</div>
    <div class="heroes" id="heroes"></div>
    <div class="chat" id="chat"></div>
    <div class="composer">
      <input class="ipt" id="msgIpt" maxlength="120" placeholder="传音入密…">
      <button class="btn primary" id="sendBtn">传音</button>
    </div>
  </div>

  <!-- 二级页(PK/榜等) -->
  <div class="scene" id="sub"><div id="subContent"></div></div>
</div>

<div class="modal-mask" id="modalMask"><div class="scroll-card modal" id="modalBox"></div></div>
<div id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rand=a=>a[Math.floor(Math.random()*a.length)];
const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
let toastT=null;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),1900);}
function goScene(id){document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on'));$('#'+id).classList.add('on');window.scrollTo(0,0);}
function showModal(html){$('#modalBox').innerHTML=html;$('#modalMask').classList.add('on');}
function hideModal(){$('#modalMask').classList.remove('on');}
$('#modalMask').onclick=e=>{if(e.target===$('#modalMask'))hideModal();};

// ---- 配置 ----
const SB_URL='https://cddkniwbhvcbfgkgomtl.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZGtuaXdiaHZjYmZna2dvbXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NDc2MTMsImV4cCI6MjA5ODAyMzYxM30.1DaEJe4n91CZ0NcXKvyvPVUobPfc8QCePP3EG1aGpnY';
let sb=null;

const SECTS={
  sanren:{nm:'散人', ic:'🚶', tag:'无门无派，自在江湖'},
  shaolin:{nm:'少林', ic:'🏯', tag:'外家刚猛', sys:'gang'},
  wudang:{nm:'武当', ic:'⛩️', tag:'以柔克刚', sys:'rou'},
  emei:{nm:'峨眉', ic:'🗻', tag:'身法灵动', sys:'ling'},
  gaibang:{nm:'丐帮', ic:'🥢', tag:'人多势众', sys:'gang'},
};
const SECT_ORDER=['sanren','shaolin','wudang','emei','gaibang'];
const TALENTS=[
  {id:'gang', nm:'刚猛', tag:'主攻', dist:{atk:4,def:2}},
  {id:'rou',  nm:'柔化', tag:'主守', dist:{def:4,root:2}},
  {id:'ling', nm:'灵巧', tag:'主身法', dist:{agi:4,luck:2}},
  {id:'qi',   nm:'气宗', tag:'主内力', dist:{root:4,def:2}},
];

// ---- 我的身份 ----
let ME=null;   // {uid, name, sect, av, ...}
let curSect='sanren';
const LS='jianghu_mp_v1';
function saveLocal(){ try{ localStorage.setItem(LS, JSON.stringify({name:ME.name,sect:ME.sect,av:ME.av,talent:ME.talent})); }catch(e){} }
function loadLocal(){ try{ return JSON.parse(localStorage.getItem(LS)||'null'); }catch(e){ return null; } }

// ============ 入场/建角色 ============
let sel={sect:null, talent:null};
function initEnter(){
  const saved=loadLocal();
  $('#sectGrid').innerHTML=SECT_ORDER.map(id=>{const s=SECTS[id];return `<div class="opt" data-sect="${id}"><div class="o-nm">${s.ic} ${s.nm}</div><div class="o-tag">${s.tag}</div></div>`;}).join('');
  $('#talentGrid').innerHTML=TALENTS.map(t=>`<div class="opt" data-talent="${t.id}"><div class="o-nm">${t.nm}</div><div class="o-tag">${t.tag}</div></div>`).join('');
  $('#sectGrid').querySelectorAll('.opt').forEach(el=>el.onclick=()=>{sel.sect=el.dataset.sect;$('#sectGrid').querySelectorAll('.opt').forEach(x=>x.classList.toggle('sel',x===el));});
  $('#talentGrid').querySelectorAll('.opt').forEach(el=>el.onclick=()=>{sel.talent=el.dataset.talent;$('#talentGrid').querySelectorAll('.opt').forEach(x=>x.classList.toggle('sel',x===el));});
  if(saved){ $('#nameIpt').value=saved.name||''; sel.sect=saved.sect; sel.talent=saved.talent;
    $('#sectGrid').querySelector(`[data-sect="${saved.sect}"]`)?.classList.add('sel');
    $('#talentGrid').querySelector(`[data-talent="${saved.talent}"]`)?.classList.add('sel'); }
}

// ============ 后端就绪 + 匿名登录 + 建角色 ============
async function ensureSb(){
  if(sb) return sb;
  for(let i=0;i<60 && !(window.supabase&&window.supabase.createClient);i++) await new Promise(r=>setTimeout(r,50));
  if(!(window.supabase&&window.supabase.createClient)) throw new Error('supabase未加载');
  sb=window.supabase.createClient(SB_URL,SB_ANON,{auth:{persistSession:true,autoRefreshToken:true}});
  return sb;
}
async function enterJianghu(name, sect, talent){
  await ensureSb();
  let { data:{ session } } = await sb.auth.getSession();
  if(!session){ const { data, error }=await sb.auth.signInAnonymously(); if(error) throw error; session=data.session; }
  const uid=session.user.id;
  // 五维
  const t=TALENTS.find(x=>x.id===talent)||TALENTS[0];
  const stats={atk:5,agi:5,root:5,def:5,luck:5};
  Object.keys(t.dist).forEach(k=>stats[k]+=t.dist[k]);
  const av=({gang:'🗡️',rou:'🧘',ling:'🥷',qi:'🧙'})[talent]||'🧑';
  const hpMax=90+stats.def*8, mpMax=50+stats.root*6;
  // 先看是否已有存档(同一 auth uid 再进来 → 加载, 不重置)
  const { data:exist }=await sb.from('jh_players').select('*').eq('auth_uid',uid).maybeSingle();
  if(exist && exist.lv){
    ME={ uid, name:exist.name, sect:exist.sect, talent, av:exist.av, lv:exist.lv, rep:exist.rep||0,
      wins:exist.wins||0, losses:exist.losses||0, stats:exist.stats||stats, skills:exist.skills||['pingzhang','roujin','shenxing','yungong','gedang'],
      hp:exist.hp, hp_max:exist.hp_max, mp:exist.mp, mp_max:exist.mp_max,
      exp:exist.exp||0, gongli:exist.gongli||0, silver:exist.silver||50, title:exist.title||'',
      master:exist.master, sect_rank:exist.sect_rank||0 };
    // 若这次改了名号/门派, 更新
    if(name!==exist.name || sect!==exist.sect){ ME.name=name; ME.sect=sect; await sb.from('jh_players').update({name,sect,last_seen:new Date().toISOString()}).eq('auth_uid',uid); }
    else await sb.from('jh_players').update({last_seen:new Date().toISOString()}).eq('auth_uid',uid);
  } else {
    // 初始武学 = 通用基础 + 本门派入门招(tier1)
    const baseSkills=['pingzhang','roujin','shenxing','yungong','gedang'];
    const entry=(SECT_TREE[sect]||[])[0]; if(entry) baseSkills.push(entry);
    ME={ uid, name, sect, talent, av, lv:1, rep:0, wins:0, losses:0, stats,
      skills:baseSkills,
      hp:hpMax, hp_max:hpMax, mp:mpMax, mp_max:mpMax,
      exp:0, gongli:0, silver:50, title:'', master:null, sect_rank:0 };
    await sb.from('jh_players').upsert({ auth_uid:uid, name, sect, av, lv:1, rep:0, wins:0, losses:0,
      stats, skills:ME.skills, hp:hpMax, hp_max:hpMax, mp:mpMax, mp_max:mpMax,
      exp:0, gongli:0, silver:50, title:'', is_bot:false, last_seen:new Date().toISOString() });
  }
  saveLocal();
  curSect=ME.sect;
  enterHall();
}

// 门派武学树(按境界解锁: 入门即得tier1, 功力到「登堂入室」解锁tier2, 「炉火纯青」解锁tier3绝学)
const SECT_TREE={
  shaolin:['luohan','weituo','jingang'],
  wudang:['tiyun','taiji','liangyi'],
  emei:['feihua','lingbo','wandu'],
  gaibang:['dagou','kuanglong','jianglong'],
  sanren:[],   // 散人无门派树, 靠秘籍
};
const TIER_REALM=[0,0,1000,6000];   // tier→需达到的功力(1000=登堂入室, 6000=炉火纯青)
const SYS_LABEL={gang:'刚',rou:'柔',ling:'灵',none:'—'};
const SYS_CLS={gang:'sys-gang',rou:'sys-rou',ling:'sys-ling'};
function sysWin(a,b){ if(a===b||a==='none'||b==='none')return 0; const beat={gang:'rou',rou:'ling',ling:'gang'}; if(beat[a]===b)return 1; if(beat[b]===a)return -1; return 0; }

// 由玩家资料算战斗属性。功力(打坐所得)真正反哺战力: 每档功力加攻防内力气血。
function fighterFrom(p){
  const s=p.stats||{atk:5,agi:5,root:5,def:5,luck:5};
  const g=p.gongli||0;
  const gk=Math.sqrt(g/60);           // 功力加成系数(平方根,边际递减): 功力240→2, 6000→10
  const lv=p.lv||1;
  const hpMax=Math.round((p.hp_max||100)+g*0.04+lv*6);   // 功力+等级 撑气血
  const mpMax=Math.round((p.mp_max||60)+g*0.03);
  return { name:p.name, av:p.av||'🧑', skills:p.skills||['pingzhang','roujin','shenxing','yungong','gedang'],
    hp:hpMax, hpMax, mp:mpMax, mpMax,
    atk:Math.round(8+s.atk*2+gk*2.2), def:Math.round(6+s.def*1.5+gk*1.6), agi:Math.round(5+s.agi*1.6+gk*1.4),
    stance:0, stanceMax:100, charged:false, guarding:false };
}
// 结算一回合(挑战者端执行, 纯函数改 state)。返回 {log:[], cHp, oHp, ...}
function resolveTurn(st, cMove, oMove){
  // st.c / st.o 是双方战斗态
  const C=st.c, O=st.o;
  const cs=SKILLS[cMove]||SKILLS.pingzhang, os=SKILLS[oMove]||SKILLS.pingzhang;
  C.mp=clamp(C.mp-cs.mp,0,C.mpMax); O.mp=clamp(O.mp-os.mp,0,O.mpMax);
  C.guarding=(cs.kind==='guard'); O.guarding=(os.kind==='guard');
  const logs=[];
  const cAtk=(cs.kind==='attack'||cs.kind==='special'), oAtk=(os.kind==='attack'||os.kind==='special');
  if(cs.kind==='charge'){ C.mp=clamp(C.mp+18,0,C.mpMax); C.charged=true; logs.push({s:'c',t:`${C.name}运功蓄势，内力回涌。`}); }
  if(os.kind==='charge'){ O.mp=clamp(O.mp+18,0,O.mpMax); O.charged=true; logs.push({s:'o',t:`${O.name}凝气待发。`}); }
  const hit=(atk,def,aS,dS,who)=>{
    let dmg=atk.atk*aS.pow; if(atk.charged)dmg*=2;
    const rel=sysWin(aS.sys,dS.sys); let mark='';
    if(rel>0){dmg*=1.6;mark='破！';} else if(rel<0)dmg*=0.6;
    let red=def.def*0.5; if(def.guarding)red+=def.def*1.2;
    let brk=''; if(def.guarding&&aS.sys==='ling'){red*=0.2;brk='身法破防！';}
    dmg=Math.max(3,dmg-red);
    let crit=false; if(aS.kind==='special'&&rel>=0){dmg*=1.35;crit=true;}
    if(atk.hp<atk.hpMax*0.25)dmg*=1.2;
    dmg=Math.round(dmg); def.hp=clamp(def.hp-dmg,0,def.hpMax);
    def.stance=clamp(def.stance+(rel<0?8:16)+(crit?14:0),0,def.stanceMax);
    let exec=''; if(def.stance>=def.stanceMax){def.stance=0;const ex=Math.round(def.hpMax*0.12);def.hp=clamp(def.hp-ex,0,def.hpMax);exec=`（架势崩溃+${ex}）`;}
    logs.push({s:who, crit, rel, t:`${atk.name}施展<b>${aS.nm}</b>${mark||brk} 伤${dmg}${exec}`});
  };
  if(cAtk)hit(C,O,cs,os,'c');
  if(oAtk&&O.hp>0)hit(O,C,os,cs,'o');
  if(cAtk)C.charged=false; if(oAtk)O.charged=false;
  st.turn=(st.turn||0)+1;
  return logs;
}
// 敌人/AI托管出招
function aiPick(f){
  const usable=f.skills.filter(s=>SKILLS[s]&&f.mp>=SKILLS[s].mp);
  const sp=usable.filter(s=>SKILLS[s].kind==='special');
  if(sp.length&&f.mp>=24&&Math.random()<0.4)return rand(sp);
  if(f.mp<8&&f.skills.includes('yungong')&&Math.random()<0.6)return 'yungong';
  const atks=usable.filter(s=>SKILLS[s].kind==='attack'); return atks.length?rand(atks):(usable[0]||'pingzhang');
}

  if(duelWatchChan) return;
  duelWatchChan=sb.channel('jh-duel-watch')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'jh_duels',filter:'opponent=eq.'+ME.uid}, p=>{
      const d=p.new; if(d.status==='pending') incomingChallenge(d);
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'jh_duels'}, p=>{
      if(DUEL && p.new.id===DUEL.id) onDuelUpdate(p.new);
    })
    .subscribe();
}
// 收到战书

window.JH_DUEL={
  // 下战书
  challenge:async(uid,nm)=>{
    // 拉对方资料
    const { data:foe }=await sb.from('jh_players').select('*').eq('auth_uid',uid).maybeSingle();
    if(!foe){ toast('此人已离去'); return; }
    const me=await myPlayerRow();
    // 建初始 state
    const c=fighterFrom(me), o=fighterFrom(foe);
    const state={ c, o, turn:0 };
    const { data, error }=await sb.from('jh_duels').insert({
      challenger:ME.uid, challenger_name:ME.name, opponent:uid, opponent_name:nm,
      status:'pending', turn:0, state, log:[] }).select('id').single();
    if(error){ console.warn(error); toast('下战书失败'); return; }
    DUEL={ id:data.id, role:'c', st:state, foeName:nm, foeAv:foe.av, submitted:false, foeIsBot:!!foe.is_bot };
    showWaitAccept(nm, foe.is_bot);
    // 若对方是 bot, 直接自动应战
    if(foe.is_bot){ setTimeout(()=>{ sb.from('jh_duels').update({status:'active'}).eq('id',data.id); },800); }
  }
};
async function myPlayerRow(){ const { data }=await sb.from('jh_players').select('*').eq('auth_uid',ME.uid).maybeSingle(); return data||{name:ME.name,av:ME.av,stats:ME.stats,skills:ME.skills,hp_max:ME.hp_max,mp_max:ME.mp_max}; }

async function acceptDuel(d){
  hideModal();
  const state=d.state;
  DUEL={ id:d.id, role:'o', st:state, foeName:d.challenger_name, foeAv:(state.c&&state.c.av)||'🧑', submitted:false };
  await sb.from('jh_duels').update({status:'active'}).eq('id',d.id);
  renderDuel();
  goScene('sub');
}
// duel 行更新 → 双方据此推进
function onDuelUpdate(d){
  if(!DUEL) return;
  if(d.status==='declined'){ if(DUEL.role==='c'){ toast(DUEL.foeName+' 回避了'); DUEL=null; backHall(); } return; }
  if(d.status==='active' && DUEL.role==='c' && DUEL.st.turn===0 && !DUEL.started){ DUEL.started=true; renderDuel(); goScene('sub'); }
  if(d.status==='done'){ DUEL.st=d.state; DUEL.finalLog=d.log;
    const iWin=d.winner===ME.uid;
    // 应战方在此记自己战绩(挑战方在 settleTurn→recordDuelResult 已记)
    if(DUEL.role==='o' && !DUEL._recorded){ DUEL._recorded=true; recordDuelResult(iWin); }
    else { showDuelEnd(iWin); }
    return; }
  // 同步 state + log(应战方靠这个更新画面)
  if(d.status==='active'){
    DUEL.st=d.state;
    if(d.log) DUEL.lastLog=d.log;
    // 应战方: 清空本地submitted以便下回合出招; 挑战方结算后也在此刷新
    if(d.c_move===null && d.o_move===null){ DUEL.submitted=false; }
    renderDuel();
    // 挑战者是结算方: 若双方move都到齐, 结算
    if(DUEL.role==='c' && d.c_move && d.o_move){ settleTurn(d); }
    // 应战方等待挑战方结算
  }
}
// 挑战者结算一回合
async function settleTurn(d){
  const st=d.state;
  const logs=resolveTurn(st, d.c_move, d.o_move);
  // 判胜负
  let status='active', winner=null;
  if(st.o.hp<=0 && st.c.hp<=0){ status='done'; winner=(st.c.hp>=st.o.hp?ME.uid:d.opponent); }
  else if(st.o.hp<=0){ status='done'; winner=ME.uid; }
  else if(st.c.hp<=0){ status='done'; winner=d.opponent; }
  await sb.from('jh_duels').update({ state:st, log:logs, c_move:null, o_move:null, turn:st.turn, status, winner, updated_at:new Date().toISOString() }).eq('id',d.id);
  DUEL.st=st; DUEL.lastLog=logs; DUEL.submitted=false;
  if(status==='done'){ recordDuelResult(winner===ME.uid); }
  else{ renderDuel(); playTurnFx(logs); }
}
function playTurnFx(logs){
  (logs||[]).forEach(l=>{ if(l.crit||l.rel>0) fxWord(l.crit?'绝':'破'); });
  screenShake();
  const meHurt=(logs||[]).some(l=> (DUEL.role==='c'?l.s==='o':l.s==='c'));
  if(meHurt){ const c=$('#cb-me'); if(c){c.classList.add('hurt');setTimeout(()=>c.classList.remove('hurt'),300);} }
}

// 出招(双方通用)
async function duelMove(sid){
  if(!DUEL||DUEL.submitted) return;
  const my = DUEL.role==='c'?DUEL.st.c:DUEL.st.o;
  const s=SKILLS[sid]; if(!s||my.mp<s.mp){ toast('内力不足'); return; }
  DUEL.submitted=true;
  const field=DUEL.role==='c'?'c_move':'o_move';
  await sb.from('jh_duels').update({[field]:sid, updated_at:new Date().toISOString()}).eq('id',DUEL.id);
  renderDuel();
  // 若对手是 bot(仅挑战者遇 bot 场景): 挑战者代 bot 出招并结算
  if(DUEL.role==='c' && DUEL.foeIsBot){
    const bm=aiPick(DUEL.st.o);
    const { data:fresh }=await sb.from('jh_duels').select('*').eq('id',DUEL.id).maybeSingle();
    if(fresh){ fresh.o_move=bm; fresh.c_move=sid; await settleTurn(fresh); }
  }
}
// 渲染战斗
function renderDuel(){
  const st=DUEL.st; const meF=DUEL.role==='c'?st.c:st.o, foeF=DUEL.role==='c'?st.o:st.c;
  const bar=(cls,cur,max,txt)=>`<div class="bar ${cls}"><i style="width:${clamp(cur/max*100,0,100)}%"></i>${txt?`<span class="bt">${txt}</span>`:''}</div>`;
  const cb=(f,who,waitReady)=>`<div class="combatant" id="cb-${who}">
    <div class="cb-top"><div class="cb-av">${f.av}</div><div class="cb-nm">${esc(f.name)}</div>
      <div class="cb-wait ${waitReady?'ready':''}">${who==='foe'?(waitReady?'● 已出招':'○ 思量中'):''}</div></div>
    ${bar('bar-hp',f.hp,f.hpMax,`气血 ${Math.ceil(f.hp)}/${f.hpMax}`)}
    ${bar('bar-mp',f.mp,f.mpMax,'')}${bar('bar-st',f.stance,f.stanceMax,'')}</div>`;
  const foeMoved = DUEL.role==='c'? !!DUEL._oMove : !!DUEL._cMove; // 粗略
  const moves=meF.skills.map(sid=>{const s=SKILLS[sid];if(!s)return'';const can=meF.mp>=s.mp&&!DUEL.submitted;
    const tag=s.kind==='special'?'sys-special':(SYS_CLS[s.sys]||''); const lb=s.kind==='special'?'绝':SYS_LABEL[s.sys];
    return `<div class="move ${can?'':'disabled'}" data-skill="${sid}"><div class="mv-nm">${s.nm}${lb!=='—'?`<span class="mv-sys ${tag}">${lb}</span>`:''}</div>${s.mp?`<span class="mv-cost">${s.mp}</span>`:''}<div class="mv-desc">${s.desc}</div></div>`;}).join('');
  const logHtml=(DUEL.lastLog||[]).map(l=>{const cls=(DUEL.role==='c'?l.s==='c':l.s==='o')?'bl-you':'bl-foe';return `<div class="${cls}">${l.t}</div>`;}).join('')||'<span class="tiny">见招拆招…</span>';
  openSub(`<div class="battle">
    <div class="page-head"><span class="back" id="duelFlee">‹</span><h2>过招 · 第${st.turn+1}回合</h2></div>
    ${cb(foeF,'foe', DUEL.submitted && false)}
    ${cb(meF,'me')}
    <div class="battle-log">${logHtml}</div>
    ${DUEL.submitted?'<div class="waiting-tip">已出招，静待对方…</div>':`<div class="moves" id="duelMoves">${moves}</div>`}
  </div>`);
  goScene('sub');
  if(!DUEL.submitted){ $('#duelMoves')?.querySelectorAll('.move:not(.disabled)').forEach(el=>el.onclick=()=>duelMove(el.dataset.skill)); }
  $('#duelFlee').onclick=()=>fleeDuel();
}
async function fleeDuel(){
  if(!DUEL) return;
  if(!confirm('认输离场？记一负。')) return;
  await sb.from('jh_duels').update({status:'done', winner:(DUEL.role==='c'?DUEL.st.o&&null:null)}).eq('id',DUEL.id).catch(()=>{});
  // 简化: 逃即判负
  recordDuelResult(false, true);
}
function showDuelEnd(win){

// 记录战绩(赢/输)
async function recordDuelResult(win, fled){
  const me=await myPlayerRow();
  const patch={};
  if(win){ patch.wins=(me.wins||0)+1; patch.rep=(me.rep||0)+rnd(5,12); ME.rep=patch.rep; ME.wins=patch.wins; }
  else{ patch.losses=(me.losses||0)+1; ME.losses=patch.losses; }
  await sb.from('jh_players').update(patch).eq('auth_uid',ME.uid);
  renderMe();
  showDuelEnd(win);
  // 广播战报到当前门派厅(supabase insert 是 thenable, 用 await/try 而非 .catch)
  if(win){ try{ await sb.from('jh_messages').insert({sect:curSect,user_id:ME.uid,name:ME.name,av:ME.av,is_bot:false,kind:'sys',text:`${ME.name} 击败了 ${DUEL?DUEL.foeName:'对手'}！`}); }catch(e){} }
}

//  怀旧江湖玩法: 打坐/偷袭/师徒/丹药/恩怨/威望榜
// ============================================================
// 功力到境界 → 解锁本门派武学树对应 tier 招式(入门即得, 登堂入室解锁进阶, 炉火纯青解锁绝学)
function unlockSectSkills(){
  const tree=SECT_TREE[ME.sect]||[]; const g=ME.gongli||0; let learned=[];
  tree.forEach((sid,idx)=>{ const tier=idx+1; const need=TIER_REALM[tier]||0;
    if(g>=need && !ME.skills.includes(sid)){ ME.skills.push(sid); learned.push(SKILLS[sid].nm); }
  });
  if(learned.length){ toast('参悟门派武学：'+learned.join('、')+'！'); try{ sb.from('jh_players').update({skills:ME.skills}).eq('auth_uid',ME.uid); }catch(e){} }
  return learned;
}

// —— 打坐练功: 挂机涨功力+经验, 起身即止 ——
let medTimer=null, medGain=0;
function toggleMeditate(){
  if(medTimer){ stopMeditate(); return; }
  $('#opMeditate').classList.add('active'); $('#opMeditate').textContent='🧘 运功中(点击起身)';
  medGain=0;
  showModal(`<div class="meditate-box"><div class="meditate-orb">🧘</div>
    <div style="margin-top:10px;font-weight:700">凝神打坐，周天运转…</div>
    <div class="med-gain" id="medGain">已聚功力 +0</div>
    <div class="tiny mt" id="medRealm"></div>
    <button class="btn primary wide mt2" id="medStop">起身收功</button></div>`);
  $('#medStop').onclick=stopMeditate;
  const tick=async()=>{
    const g=rnd(3,7)+Math.floor((ME.stats.root||5)/2);   // 内力资质高涨得快
    ME.gongli=(ME.gongli||0)+g; medGain+=g; ME.exp=(ME.exp||0)+Math.ceil(g/2);
    // 升级判定
    while(ME.exp>=ME.lv*80){ ME.exp-=ME.lv*80; ME.lv++; ME.hp_max+=10; ME.mp_max+=6; }
    unlockSectSkills();   // 功力到境界 → 自动参悟门派武学
    $('#medGain') && ($('#medGain').textContent=`已聚功力 +${medGain}`);
    const nx=realmNext(ME.gongli);
    $('#medRealm') && ($('#medRealm').textContent=`当前境界：${realmOf(ME.gongli)}${nx?` · 距「${nx[1]}」还需 ${nx[0]-ME.gongli}`:' · 已臻化境'}`);
  };
  tick();
  medTimer=setInterval(tick, 2500);
}
async function stopMeditate(){
  if(!medTimer) return; clearInterval(medTimer); medTimer=null;
  $('#opMeditate').classList.remove('active'); $('#opMeditate').textContent='🧘 打坐练功';
  hideModal();
  try{ await sb.from('jh_players').update({gongli:ME.gongli,exp:ME.exp,lv:ME.lv,hp_max:ME.hp_max,mp_max:ME.mp_max}).eq('auth_uid',ME.uid); }catch(e){}
  renderMe();
  if(medGain>0) toast(`收功，共聚功力 ${medGain}，境界：${realmOf(ME.gongli)}`);
}

// —— 偷袭: 聊天室对在场任何人突袭(掉血+结仇, realtime通知), 有冷却 ——
async function ambush(uid, nm){
  const now=Date.now();
  if(ME._lastAmbush && now-ME._lastAmbush<20000){ toast('出手太频，稍后再袭('+Math.ceil((20000-(now-ME._lastAmbush))/1000)+'s)'); return; }
  ME._lastAmbush=now;
  // RLS 只允许改自己的行, 攻击者不能直接扣对方hp → 把伤害写进 feud.detail(dmg=N),
  // 被袭者收到 realtime 后【自己】扣自己的血(见 onAmbushed)。
  const dmg=rnd(8,18)+Math.floor((ME.stats.atk||5)*1.5);
  await sb.from('jh_feuds').insert({actor:ME.uid,actor_name:ME.name,target:uid,target_name:nm,kind:'ambush',detail:'dmg='+dmg});
  try{ await sb.from('jh_messages').insert({sect:curSect,user_id:ME.uid,name:ME.name,av:ME.av,is_bot:false,kind:'sys',text:`${ME.name} 暗施冷手偷袭了 ${nm}！(伤${dmg})`}); }catch(e){}
  toast(`偷袭得手！${nm} 气血-${dmg}`);
}
// 收到别人偷袭我 → 自己扣血(RLS下只有本人能改自己hp)
async function onAmbushed(f){
  const m=/dmg=(\d+)/.exec(f.detail||''); const dmg=m?+m[1]:rnd(8,18);
  ME.hp=clamp((ME.hp||ME.hp_max)-dmg,1,ME.hp_max);   // 偷袭不致死留1血
  try{ await sb.from('jh_players').update({hp:ME.hp}).eq('auth_uid',ME.uid); }catch(e){}
  renderMe();
  toast(`⚠ ${f.actor_name} 偷袭了你！气血-${dmg}，速去恩怨录寻仇`);
}

// —— 师徒: 拜师(设 master) + 师父传功(把自己会的招传给徒弟) ——
async function askMaster(uid, nm){
  if(ME.master){ toast('你已有师父'); return; }
  if(uid===ME.uid){ toast('不能拜自己'); return; }
  ME.master=uid;
  await sb.from('jh_players').update({master:uid}).eq('auth_uid',ME.uid);
  await sb.from('jh_feuds').insert({actor:ME.uid,actor_name:ME.name,target:uid,target_name:nm,kind:'apprentice',detail:'拜师'});
  try{ await sb.from('jh_messages').insert({sect:curSect,user_id:ME.uid,name:ME.name,av:ME.av,is_bot:false,kind:'sys',text:`${ME.name} 拜 ${nm} 为师！`}); }catch(e){}
  toast(`你拜 ${nm} 为师`);
}
async function openMaster(){
  // 展示我的师父 + 我的徒弟 + 传功
  const { data:mine }=await sb.from('jh_players').select('*').eq('master',ME.uid);

    <div class="tiny">你的师父：<b>${esc(masterNm)}</b></div>

    ${disciples.length?disciples.map(d=>`<div class="scroll-card" style="margin:6px 0;display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">${esc(d.av||'🧑')}</span><span style="flex:1">${esc(d.name)}</span>
      <button class="btn sm" data-teach="${d.auth_uid}">传功</button></div>`).join(''):'<div class="tiny" style="color:var(--dim)">尚无徒弟。点群侠可收徒/被拜。</div>'}
    <button class="btn ghost wide mt2" onclick="hideModal()">关闭</button></div>`);
  document.querySelectorAll('[data-teach]').forEach(el=>el.onclick=()=>teachDisciple(el.dataset.teach));

async function teachDisciple(uid){
  // 把我会的一个高级招传给徒弟
  const advanced=ME.skills.filter(s=>['kuangfeng','taiji','lingbo','jiuyin','liuyun','wandu'].includes(s));
  if(!advanced.length){ toast('你还没有可传的高深武学'); return; }
  const { data:d }=await sb.from('jh_players').select('skills,name').eq('auth_uid',uid).maybeSingle();
  if(!d){ toast('徒弟已离去'); return; }
  const has=d.skills||[]; const canTeach=advanced.filter(s=>!has.includes(s));
  if(!canTeach.length){ toast('徒弟已尽得你所学'); return; }
  const sk=canTeach[0];
  await sb.from('jh_players').update({skills:[...has,sk]}).eq('auth_uid',uid);
  ME.rep=(ME.rep||0)+5; await sb.from('jh_players').update({rep:ME.rep}).eq('auth_uid',ME.uid); renderMe();
  toast(`你将「${SKILLS[sk].nm}」传给了 ${d.name}，威望+5`);
  openMaster();
}

    ${ELIXIRS.map(e=>`<div class="scroll-card" style="margin-bottom:8px;display:flex;align-items:center;gap:10px">

      <button class="btn sm" data-elixir="${e.id}">${e.price}两</button></div>`).join('')}
    <button class="btn ghost wide mt" onclick="hideModal()">关闭</button></div>`);
  document.querySelectorAll('[data-elixir]').forEach(el=>el.onclick=async()=>{

// —— 恩怨录 ——
async function openFeud(){
  const { data }=await sb.from('jh_feuds').select('*').or(`target.eq.${ME.uid},actor.eq.${ME.uid}`).order('created_at',{ascending:false}).limit(30);
  const rows=(data||[]);
  showModal(`<div><div style="font-size:17px;font-weight:700;margin-bottom:8px">📜 恩怨录</div>
    ${rows.length?rows.map(f=>{
      const iAmTarget=f.target===ME.uid;
      let txt;
      if(f.kind==='ambush') txt=iAmTarget?`<span style="color:var(--red)">${esc(f.actor_name)} 偷袭了你</span>`:`你偷袭了 ${esc(f.target_name)}`;
      else if(f.kind==='apprentice') txt=iAmTarget?`${esc(f.actor_name)} 拜你为师`:`你拜 ${esc(f.target_name)} 为师`;
      else txt=esc(f.detail||f.kind);
      const canRevenge=iAmTarget&&f.kind==='ambush';
      return `<div class="scroll-card" style="margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:13px">
        <span style="flex:1">${txt} <span class="tiny" style="color:var(--dim)">${fmtAgo(f.created_at)}</span></span>
        ${canRevenge?`<button class="btn sm" data-revenge="${f.actor}" data-nm="${esc(f.actor_name)}">寻仇</button>`:''}</div>`;
    }).join(''):'<div class="tiny center" style="padding:20px;color:var(--dim)">江湖恩怨，尚是一张白纸。</div>'}
    <button class="btn ghost wide mt" onclick="hideModal()">关闭</button></div>`);
  document.querySelectorAll('[data-revenge]').forEach(el=>el.onclick=()=>{ hideModal(); if(window.JH_DUEL) JH_DUEL.challenge(el.dataset.revenge, el.dataset.nm); });
}
function fmtAgo(ts){ const s=Math.floor((Date.now()-new Date(ts).getTime())/1000); if(s<60)return'刚刚'; if(s<3600)return Math.floor(s/60)+'分钟前'; if(s<86400)return Math.floor(s/3600)+'时前'; return Math.floor(s/86400)+'天前'; }

// ============================================================
//  演武场: 单人 vs NPC 战斗(复用相克引擎, 不走 jh_duels, 纯前端即时)
// ============================================================
const NPC_POOL=[
  {name:'木人桩', av:'🪵', lvOff:-1, skills:['pingzhang','gedang'], reward:{exp:8,silver:3,gongli:5}, intro:'练武场的木人桩，最适合初学者试招。'},
  {name:'街边泼皮', av:'🧟', lvOff:0, skills:['pingzhang','roujin','gedang'], reward:{exp:14,silver:8,gongli:8}},
  {name:'黑店打手', av:'💪', lvOff:1, skills:['pingzhang','kuangfeng','yungong','gedang'], reward:{exp:22,silver:15,gongli:12}, drop:'kuangfeng',dropRate:0.2},
  {name:'流浪剑客', av:'🗡️', lvOff:1, skills:['shenxing','feihua','yungong'], reward:{exp:24,silver:14,gongli:14}, drop:'feihua',dropRate:0.15},
  {name:'蒙面高手', av:'🥷', lvOff:2, skills:['roujin','taiji','gedang','yungong'], reward:{exp:36,silver:26,gongli:22}, drop:'taiji',dropRate:0.15},
  {name:'魔教护法', av:'😈', lvOff:3, skills:['kuangfeng','jiuyin','gedang','yungong'], reward:{exp:60,silver:45,gongli:40}, drop:'jiuyin',dropRate:0.12},
];
let NB=null;   // NPC battle state
function openArena(){
  showModal(`<div><div style="font-size:17px;font-weight:700;margin-bottom:4px">🥊 演武场</div>
    <div class="tiny" style="margin-bottom:10px">与江湖散人过招，练招练级涨功力。败不失命，胜有所得。</div>
    ${NPC_POOL.map((n,i)=>{const lv=Math.max(1,ME.lv+(n.lvOff||0));return `<div class="scroll-card" style="margin-bottom:7px;display:flex;align-items:center;gap:9px;cursor:pointer" data-npc="${i}">
      <span style="font-size:22px">${n.av}</span>
      <div style="flex:1"><div style="font-weight:700">${n.name} <span class="tiny" style="color:var(--dim)">第${lv}重</span></div>
      <div class="tiny" style="color:var(--dim)">${n.drop?'可能习得'+SKILLS[n.drop].nm:'练手'}</div></div>
      <span class="btn sm">较量</span></div>`;}).join('')}
    <button class="btn ghost wide mt" onclick="hideModal()">离开</button></div>`);
  document.querySelectorAll('[data-npc]').forEach(el=>el.onclick=()=>{ hideModal(); startNpcBattle(NPC_POOL[+el.dataset.npc]); });
}
function startNpcBattle(tpl){
  if(ME.hp<ME.hp_max*0.2){ toast('气血过低，先疗伤'); return; }
  const lv=Math.max(1,ME.lv+(tpl.lvOff||0));
  const me=fighterFrom({stats:ME.stats,gongli:ME.gongli,hp_max:ME.hp_max,mp_max:ME.mp_max,lv:ME.lv,skills:ME.skills,name:ME.name,av:ME.av});
  me.hp=ME.hp; me.mp=ME.mp;   // 沿用当前气血内力
  const foe=fighterFrom({stats:{atk:4+lv,agi:3+lv,root:3+lv,def:3+lv,luck:3}, gongli:lv*180, hp_max:60+lv*18, mp_max:30+lv*8, lv, skills:tpl.skills, name:tpl.name, av:tpl.av});
  NB={ me, foe, tpl, turn:0, foeNext:aiPick(foe) };
  renderNpc(tpl.intro||`${tpl.name} 摆开架势！`);
}
function renderNpc(top){
  const {me,foe}=NB;
  const bar=(cls,c,m,t)=>`<div class="bar ${cls}"><i style="width:${clamp(c/m*100,0,100)}%"></i>${t?`<span class="bt">${t}</span>`:''}</div>`;
  const cb=(f,who)=>`<div class="combatant" id="ncb-${who}"><div class="cb-top"><div class="cb-av">${f.av}</div><div class="cb-nm">${esc(f.name)}</div></div>
    ${bar('bar-hp',f.hp,f.hpMax,`气血 ${Math.ceil(f.hp)}/${f.hpMax}`)}${bar('bar-mp',f.mp,f.mpMax,'')}${bar('bar-st',f.stance,f.stanceMax,'')}</div>`;
  const moves=me.skills.map(sid=>{const s=SKILLS[sid];if(!s)return'';const can=me.mp>=s.mp;const tag=s.kind==='special'?'sys-special':(SYS_CLS[s.sys]||'');const lb=s.kind==='special'?'绝':SYS_LABEL[s.sys];
    return `<div class="move ${can?'':'disabled'}" data-nsk="${sid}"><div class="mv-nm">${s.nm}${lb!=='—'?`<span class="mv-sys ${tag}">${lb}</span>`:''}</div>${s.mp?`<span class="mv-cost">${s.mp}</span>`:''}<div class="mv-desc">${s.desc}</div></div>`;}).join('');
  const logHtml=(NB.lastLog||[]).map(l=>`<div class="${l.s==='c'?'bl-you':'bl-foe'}">${l.t}</div>`).join('')||'<span class="tiny">见招拆招…</span>';
  openSub(`<div class="battle"><div class="page-head"><span class="back" id="npcFlee">‹</span><h2>演武 · 第${NB.turn+1}回合</h2></div>
    ${top?`<div class="narrate">${top}</div>`:''}
    ${cb(foe,'foe')}${cb(me,'me')}
    <div class="battle-log">${logHtml}</div>
    <div class="moves" id="npcMoves">${moves}</div></div>`);
  goScene('sub');
  $('#npcMoves').querySelectorAll('.move:not(.disabled)').forEach(el=>el.onclick=()=>npcMove(el.dataset.nsk));
  $('#npcFlee').onclick=()=>{ if(confirm('退出较量？')){ syncMe(); backHall(); } };
}
function npcMove(sid){
  const {me,foe}=NB; const s=SKILLS[sid]; if(!s||me.mp<s.mp){ toast('内力不足'); return; }
  const foeSid=NB.foeNext;
  // 复用 resolveTurn(以 c=me, o=foe)
  const st={c:me, o:foe, turn:NB.turn};
  const logs=resolveTurn(st, sid, foeSid);
  NB.turn=st.turn; NB.lastLog=logs;
  playNpcFx(logs);
  if(foe.hp<=0){ return endNpc(true); }
  if(me.hp<=0){ return endNpc(false); }
  NB.foeNext=aiPick(foe);
  renderNpc('');
}
function playNpcFx(logs){ (logs||[]).forEach(l=>{ if(l.crit||l.rel>0) fxWord(l.crit?'绝':'破'); }); screenShake();
  const meHurt=(logs||[]).some(l=>l.s==='o'); if(meHurt){ const c=$('#ncb-me'); if(c){c.classList.add('hurt');setTimeout(()=>c.classList.remove('hurt'),300);} } }
function syncMe(){ ME.hp=Math.round(NB.me.hp); ME.mp=Math.round(NB.me.mp); sb.from('jh_players').update({hp:ME.hp,mp:ME.mp}).eq('auth_uid',ME.uid).then(()=>{}); }
async function endNpc(win){
  const tpl=NB.tpl; ME.hp=Math.round(NB.me.hp); ME.mp=Math.round(NB.me.mp);
  let dropHtml='';
  if(win){
    const r=tpl.reward||{}; ME.exp=(ME.exp||0)+(r.exp||10); ME.silver=(ME.silver||0)+(r.silver||5); ME.gongli=(ME.gongli||0)+(r.gongli||8);
    let up=[]; while(ME.exp>=ME.lv*80){ ME.exp-=ME.lv*80; ME.lv++; ME.hp_max+=10; ME.mp_max+=6; up.push(ME.lv); }
    if(tpl.drop && !ME.skills.includes(tpl.drop) && Math.random()<(tpl.dropRate||0)){ ME.skills.push(tpl.drop); dropHtml=`<div class="mt" style="color:var(--gold);font-weight:700">✦ 习得 ${SKILLS[tpl.drop].nm}！</div>`; }
    unlockSectSkills();
    await sb.from('jh_players').update({exp:ME.exp,silver:ME.silver,gongli:ME.gongli,lv:ME.lv,hp:ME.hp,mp:ME.mp,hp_max:ME.hp_max,mp_max:ME.mp_max,skills:ME.skills}).eq('auth_uid',ME.uid);
    renderMe();
    openSub(`<div class="battle-end win"><div class="be-title">胜</div>
      <div class="narrate">你击败了 ${tpl.name}。</div>
      <div class="mt">经验+${tpl.reward.exp} · 银两+${tpl.reward.silver} · 功力+${tpl.reward.gongli}</div>
      ${up.length?`<div class="tiny mt">修为精进至第${ME.lv}重</div>`:''}${dropHtml}
      <button class="btn primary wide mt2" onclick="backHall()">收势</button>
      <button class="btn ghost wide mt" id="npcAgain">再战</button></div>`);
    goScene('sub'); $('#npcAgain')&&($('#npcAgain').onclick=()=>startNpcBattle(tpl));
  } else {
    ME.hp=Math.max(1,Math.round(ME.hp_max*0.15));
    await sb.from('jh_players').update({hp:ME.hp,mp:ME.mp}).eq('auth_uid',ME.uid);
    renderMe();
    openSub(`<div class="battle-end lose"><div class="be-title">败</div>
      <div class="narrate">不敌 ${tpl.name}，你负伤退下。</div>
      <div class="tiny mt">去丹药铺疗伤，或打坐调养。</div>
      <button class="btn wide mt2" onclick="backHall()">退下</button></div>`);
    goScene('sub');
  }
  NB=null;
}

// ============================================================
//  AI 店小二: 常驻大厅, 冷场自动说话(本地文案库打底, worker增强见第四批)
// ============================================================
const XIAOER_LINES=[
  '客官里边请~ 上好的女儿红，还是先歇歇脚?',
  '听说最近黑风寨的悍匪又出来劫道了，各位当心。',
  '哟，这位少侠面生得很，头回来咱们这江湖吧?',
  '要我说啊，练武不如练心，可这话没人爱听。',
  '昨儿个有位大侠在演武场连胜十场，威风得紧！',
  '茶续上了~ 江湖路远，喝口热的暖暖身子。',
  '欸，几位要是手痒，比武台随时恭候。',
  '有恩报恩，有仇报仇，这才是江湖嘛。',
  '风紧，扯呼——啊不，我是说，天要变了。',
];
let xiaoerTimer=null;
// 求 AI 生成(worker在则真AI, 不在则本地文案兜底)。job结果由worker发进厅, 前端realtime收到。
async function reqAI(kind, prompt, fallbackFn){
  try{ await sb.from('jh_ai_jobs').insert({kind, sect:curSect, requester:ME.uid, prompt}); }
  catch(e){ /* 建job失败 → 兜底 */ }
  // 3.5秒内没等到worker结果(worker没开) → 本地兜底发一句(前端本地渲染, 不入库避免和worker重复)
  const before=Date.now();
  setTimeout(()=>{
    // 若这几秒内厅里已出现 说书人/店小二 的新消息, 认为worker处理了, 不兜底
    const recent=[...document.querySelectorAll('#chat .m-nm')].slice(-4).some(e=>/店小二|说书人/.test(e.textContent) && true);
    if(fallbackFn && !_aiRespondedSince(before)) fallbackFn();
  }, 3800);
}
let _lastAiMsgAt=0;
function _aiRespondedSince(t){ return _lastAiMsgAt>t; }
function startXiaoer(){
  clearInterval(xiaoerTimer);
  const say=()=>{
    if(Math.random()<0.55) return;
    // 60%求AI轶事, 40%店小二本地闲话(轻量, 不全靠worker)
    if(Math.random()<0.6){ reqAI('anecdote','讲一段此刻江湖的轶事或传闻', ()=>appendMsg({sect:curSect,user_id:'xiaoer',name:'店小二',av:'🏮',is_bot:true,kind:'msg',text:rand(XIAOER_LINES)},false)); }
    else appendMsg({sect:curSect,user_id:'xiaoer',name:'店小二',av:'🏮',is_bot:true,kind:'msg',text:rand(XIAOER_LINES)},false);
  };
  xiaoerTimer=setInterval(say, 28000);
  setTimeout(()=>appendMsg({sect:curSect,user_id:'xiaoer',name:'店小二',av:'🏮',is_bot:true,kind:'msg',text:rand(['客官里边请~','又来了位少侠，快请坐！','店里新到一坛女儿红，尝尝?'])},false), 1200);
}

  {sid:'liuyun', price:160, tag:'柔劲绝招'},

        ${owned?'<span class="tiny" style="color:var(--jade)">已习</span>':`<button class="btn sm" data-book="${b.sid}" data-price="${b.price}">${b.price}两</button>`}</div>`;}).join('')}
