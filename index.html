<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>一炷香江湖</title>
<style>
  :root{
    --ink:#1a1613;         /* 墨色主文字 */
    --paper:#e8ddc7;       /* 宣纸底 */
    --paper2:#ddceb0;      /* 深一点宣纸 */
    --paper3:#f0e8d6;      /* 浅宣纸(卡片) */
    --sub:#6b5d47;         /* 次要文字 */
    --dim:#98876a;         /* 弱文字 */
    --red:#a8321e;         /* 朱砂红 */
    --red-d:#7c2415;
    --gold:#9a7b3f;        /* 金 */
    --jade:#4a7c59;        /* 竹青 */
    --line:rgba(60,45,30,.22);
    --line2:rgba(60,45,30,.4);
    --hp:#a8321e; --mp:#3a6b8c; --stance:#c99a3f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior:none}
  body{
    font-family:"Kaiti SC","STKaiti","KaiTi","Songti SC","SimSun",serif;
    background:var(--paper);color:var(--ink);font-size:15px;min-height:100vh;min-height:100dvh;
    -webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;line-height:1.7;
  }
  /* 宣纸纹理 + 暗角 */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background:
      radial-gradient(ellipse 90% 70% at 50% 40%,transparent 55%,rgba(60,40,20,.18) 100%),
      repeating-linear-gradient(0deg,rgba(120,90,50,.025) 0 2px,transparent 2px 4px),
      repeating-linear-gradient(90deg,rgba(120,90,50,.02) 0 3px,transparent 3px 6px);}
  /* 淡墨山水远景 */
  body::after{content:"";position:fixed;left:0;right:0;bottom:0;height:38vh;z-index:0;pointer-events:none;opacity:.13;
    background:
      radial-gradient(ellipse 40% 100% at 15% 100%,var(--ink) 0%,transparent 62%),
      radial-gradient(ellipse 55% 120% at 48% 100%,var(--ink) 0%,transparent 58%),
      radial-gradient(ellipse 45% 90% at 82% 100%,var(--ink) 0%,transparent 60%);}

  .wrap{max-width:560px;margin:0 auto;padding:20px 18px 40px;position:relative;z-index:1;min-height:100dvh}

  /* 竖排标题/印章通用 */
  .seal{display:inline-block;background:var(--red);color:var(--paper3);font-weight:700;
    padding:3px 7px;border-radius:4px;font-size:12px;letter-spacing:2px;box-shadow:1px 1px 0 var(--red-d)}
  .brush-title{font-size:30px;font-weight:700;letter-spacing:4px;color:var(--ink);position:relative;display:inline-block}
  .brush-title::after{content:"";position:absolute;left:-4px;right:-4px;bottom:-3px;height:3px;
    background:linear-gradient(90deg,transparent,var(--ink) 20%,var(--ink) 80%,transparent);opacity:.55;border-radius:2px}

  /* 通用卡片 */
  .scroll-card{background:linear-gradient(180deg,var(--paper3),var(--paper2));border:1px solid var(--line2);
    border-radius:6px;padding:16px;position:relative;box-shadow:0 3px 12px -6px rgba(40,25,10,.4)}
  .scroll-card::before,.scroll-card::after{content:"";position:absolute;left:8px;right:8px;height:2px;background:var(--line);opacity:.5}
  .scroll-card::before{top:4px} .scroll-card::after{bottom:4px}

  /* 按钮:仿木牌/竹简 */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    font-family:inherit;font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;
    padding:11px 18px;border-radius:5px;border:1px solid var(--line2);color:var(--ink);
    background:linear-gradient(180deg,var(--paper3),var(--paper2));transition:.15s;user-select:none}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px -5px rgba(40,25,10,.5);border-color:var(--red)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:linear-gradient(180deg,var(--red),var(--red-d));color:var(--paper3);border-color:var(--red-d)}
  .btn.primary:hover{box-shadow:0 5px 16px -6px var(--red)}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  .btn.wide{width:100%}
  .btn.sm{padding:7px 12px;font-size:13px}

  /* 场景切换 */
  .scene{display:none;animation:inkin .5s ease} .scene.on{display:block}
  @keyframes inkin{from{opacity:0;filter:blur(6px);transform:scale(.99)}to{opacity:1;filter:blur(0);transform:none}}

  /* ===== 入场页 ===== */
  #enter{text-align:center;padding-top:12vh}
  #enter .sub{color:var(--sub);margin:14px 0 6px;letter-spacing:3px;font-size:14px}
  #enter .poem{color:var(--dim);font-size:13px;line-height:2;margin:20px 0 34px;letter-spacing:1px}
  .ink-splash{font-size:64px;line-height:1;margin-bottom:6px;filter:drop-shadow(2px 3px 2px rgba(40,25,10,.3))}

  /* ===== 角色创建 ===== */
  .field{margin:16px 0}
  .field-label{font-size:13px;color:var(--sub);letter-spacing:2px;margin-bottom:8px}
  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .opt{padding:11px 12px;border:1px solid var(--line2);border-radius:5px;cursor:pointer;transition:.15s;
    background:var(--paper3);text-align:left}
  .opt:hover{border-color:var(--red)}
  .opt.sel{border-color:var(--red);background:linear-gradient(180deg,#f3e9d3,#eaddc0);box-shadow:inset 0 0 0 1px var(--red)}
  .opt .o-nm{font-weight:700;font-size:15px}
  .opt .o-tag{font-size:11.5px;color:var(--dim);margin-top:3px;line-height:1.5}
  input.ipt{width:100%;padding:11px 13px;border:1px solid var(--line2);border-radius:5px;
    background:var(--paper3);color:var(--ink);font-family:inherit;font-size:16px;outline:none}
  input.ipt:focus{border-color:var(--red)}

  /* ===== 江湖主界面 ===== */
  .hero-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .hero-av{width:56px;height:56px;border-radius:8px;display:grid;place-items:center;font-size:30px;flex-shrink:0;
    background:linear-gradient(180deg,var(--paper3),var(--paper2));border:1px solid var(--line2);box-shadow:1px 1px 0 var(--line)}
  .hero-info{flex:1;min-width:0}
  .hero-name{font-size:20px;font-weight:700;letter-spacing:1px}
  .hero-name .title{font-size:12px;color:var(--red);margin-left:8px;font-weight:600}
  .hero-meta{font-size:12px;color:var(--sub);margin-top:2px}
  .stat-row{display:flex;gap:6px;margin-top:8px}
  .stat-chip{flex:1;text-align:center;font-size:11px;color:var(--sub);background:var(--paper3);
    border:1px solid var(--line);border-radius:4px;padding:4px 2px}
  .stat-chip b{display:block;font-size:15px;color:var(--ink);font-weight:700;margin-top:1px}

  /* 银两/内力等资源条 */
  .res-bar{display:flex;gap:10px;justify-content:center;margin:12px 0;font-size:13px;color:var(--sub)}
  .res-bar b{color:var(--red);font-weight:700}

  /* 八大系统入口 */
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:16px}
  .menu-item{padding:16px 12px;border:1px solid var(--line2);border-radius:6px;cursor:pointer;transition:.18s;
    background:linear-gradient(180deg,var(--paper3),var(--paper2));text-align:center;position:relative;overflow:hidden}
  .menu-item:hover{transform:translateY(-2px);border-color:var(--red);box-shadow:0 5px 14px -6px rgba(40,25,10,.5)}
  .menu-item .mi-ic{font-size:30px;line-height:1;margin-bottom:6px}
  .menu-item .mi-nm{font-weight:700;font-size:16px;letter-spacing:2px}
  .menu-item .mi-tag{font-size:11px;color:var(--dim);margin-top:3px}

  /* 通用二级页头 */
  .page-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .page-head .back{cursor:pointer;font-size:20px;color:var(--sub);padding:2px 6px;border-radius:4px}
  .page-head .back:hover{color:var(--red)}
  .page-head h2{font-size:20px;font-weight:700;letter-spacing:2px}

  /* 说书人叙事文 */
  .narrate{background:var(--paper3);border-left:3px solid var(--red);padding:13px 15px;border-radius:0 5px 5px 0;
    font-size:14.5px;line-height:1.9;color:var(--ink);margin:12px 0;white-space:pre-wrap}
  .narrate .who{color:var(--red);font-weight:700}

  /* toast */
  #toast{position:fixed;left:50%;bottom:60px;transform:translateX(-50%) translateY(20px);z-index:200;
    background:var(--ink);color:var(--paper3);padding:9px 18px;border-radius:6px;font-size:13.5px;
    opacity:0;pointer-events:none;transition:.25s;max-width:80vw;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .tiny{font-size:11.5px;color:var(--dim)}
  .center{text-align:center}
  .mt{margin-top:14px} .mt2{margin-top:22px}

  /* ===== 战斗界面 ===== */
  .battle{position:relative}
  .combatant{background:var(--paper3);border:1px solid var(--line2);border-radius:6px;padding:11px 13px;margin-bottom:10px;position:relative;transition:.12s}
  .combatant.hurt{animation:cbHurt .3s}
  @keyframes cbHurt{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .cb-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .cb-av{width:38px;height:38px;border-radius:7px;display:grid;place-items:center;font-size:22px;flex-shrink:0;
    background:linear-gradient(180deg,var(--paper),var(--paper2));border:1px solid var(--line2)}
  .cb-nm{font-weight:700;font-size:15px} .cb-nm .lv{font-size:11px;color:var(--dim);margin-left:5px}
  .cb-intent{margin-left:auto;font-size:12px;color:var(--sub)}
  .bar{height:12px;border-radius:6px;background:rgba(60,45,30,.15);overflow:hidden;position:relative;margin-bottom:4px}
  .bar>i{display:block;height:100%;border-radius:6px;transition:width .35s cubic-bezier(.3,.8,.3,1)}
  .bar .bar-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;color:var(--paper3);text-shadow:0 0 2px rgba(0,0,0,.5);letter-spacing:.5px}
  .bar-hp>i{background:linear-gradient(90deg,var(--red-d),var(--red))}
  .bar-mp{height:8px} .bar-mp>i{background:linear-gradient(90deg,#2c5madere,#3a6b8c)}
  .bar-mp>i{background:linear-gradient(90deg,#2c5a7a,#4a86ad)}
  .bar-stance{height:6px} .bar-stance>i{background:linear-gradient(90deg,#b8863a,#e0b45a)}
  .stance-label{font-size:10px;color:var(--dim);margin:2px 0 0}

  /* 招式选择 */
  .moves{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .move{padding:10px 11px;border:1px solid var(--line2);border-radius:6px;cursor:pointer;transition:.14s;
    background:linear-gradient(180deg,var(--paper3),var(--paper2));text-align:left;position:relative}
  .move:hover:not(.disabled){border-color:var(--red);transform:translateY(-1px)}
  .move.disabled{opacity:.4;cursor:not-allowed}
  .move .mv-nm{font-weight:700;font-size:14.5px}
  .move .mv-sys{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:5px;font-weight:600}
  .sys-gang{background:rgba(168,50,30,.16);color:var(--red)}
  .sys-rou{background:rgba(74,124,89,.18);color:var(--jade)}
  .sys-ling{background:rgba(58,107,140,.16);color:#3a6b8c}
  .sys-special{background:rgba(154,123,63,.2);color:var(--gold)}
  .move .mv-desc{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.5}
  .move .mv-cost{position:absolute;top:9px;right:10px;font-size:10.5px;color:#3a6b8c}

  /* 战斗播报 */
  .battle-log{background:var(--paper3);border:1px solid var(--line);border-radius:5px;padding:9px 12px;margin-top:12px;
    font-size:13px;line-height:1.75;min-height:52px;max-height:110px;overflow-y:auto}
  .battle-log .bl-you{color:var(--red)} .battle-log .bl-foe{color:#3a6b8c} .battle-log .bl-crit{color:var(--gold);font-weight:700}
  .battle-log .bl-break{color:var(--red);font-weight:700}

  /* 全屏水墨特效 */
  #fx{position:fixed;inset:0;z-index:150;pointer-events:none;display:flex;align-items:center;justify-content:center}
  .fx-word{font-size:88px;font-weight:900;color:var(--red);opacity:0;text-shadow:0 0 20px rgba(168,50,30,.6),3px 4px 0 var(--red-d)}
  .fx-word.go{animation:fxWord .7s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes fxWord{0%{opacity:0;transform:scale(2.4) rotate(-8deg)}30%{opacity:1;transform:scale(1) rotate(-4deg)}70%{opacity:1}100%{opacity:0;transform:scale(1.1)}}
  .fx-slash{position:absolute;width:140%;height:5px;background:linear-gradient(90deg,transparent,var(--ink),transparent);opacity:0}
  .fx-slash.go{animation:fxSlash .35s ease-out}
  @keyframes fxSlash{0%{opacity:0;transform:translateX(-60%) rotate(-20deg) scaleX(.3)}40%{opacity:.9}100%{opacity:0;transform:translateX(60%) rotate(-20deg) scaleX(1.2)}}
  .shake{animation:screenShake .3s}
  @keyframes screenShake{0%,100%{transform:none}20%{transform:translate(-4px,3px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-3px,-3px)}80%{transform:translate(3px,2px)}}

  /* 战斗结束 */
  .battle-end{text-align:center;padding:22px 12px}
  .battle-end .be-title{font-size:26px;font-weight:800;letter-spacing:3px;margin-bottom:8px}
  .battle-end.win .be-title{color:var(--red)} .battle-end.lose .be-title{color:var(--sub)}
  .combo-tag{display:inline-block;font-size:12px;color:var(--gold);font-weight:700;margin-left:6px;opacity:0;transition:.2s}
  .combo-tag.on{opacity:1}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== 入场 ===== -->
  <div class="scene on" id="enter">
    <div class="ink-splash">🗡️</div>
    <div class="brush-title">一炷香江湖</div>
    <div class="sub">一 炷 香 · 一 段 江 湖</div>
    <div class="poem">十年一剑霜刃，江湖夜雨十年灯。<br>你自何处来，又往何处去？</div>
    <button class="btn primary wide" id="startBtn">踏入江湖</button>
    <button class="btn ghost wide mt" id="continueBtn" style="display:none">续写前尘</button>
    <div class="tiny mt2">选择、招式、机缘，写就你独一份的江湖。</div>
  </div>

  <!-- ===== 角色创建 ===== -->
  <div class="scene" id="create">
    <div class="page-head"><span class="back" id="createBack">‹</span><h2>报上名号</h2></div>
    <div class="field">
      <div class="field-label">名号</div>
      <input class="ipt" id="nameIpt" maxlength="8" placeholder="给自己起个江湖名号">
    </div>
    <div class="field">
      <div class="field-label">出身</div>
      <div class="opt-grid" id="originGrid"></div>
    </div>
    <div class="field">
      <div class="field-label">资质(决定初始五维倾向)</div>
      <div class="opt-grid" id="talentGrid"></div>
    </div>
    <button class="btn primary wide mt" id="createDone">落笔成名</button>
  </div>

  <!-- ===== 江湖主界面 ===== -->
  <div class="scene" id="home">
    <div class="hero-bar">
      <div class="hero-av" id="heroAv">🧑</div>
      <div class="hero-info">
        <div class="hero-name"><span id="heroName">无名</span><span class="title" id="heroTitle"></span></div>
        <div class="hero-meta" id="heroMeta">初入江湖</div>
      </div>
    </div>
    <div class="stat-row" id="statRow"></div>
    <div class="res-bar" id="resBar"></div>
    <div class="menu-grid" id="menuGrid"></div>
    <div class="center mt2"><span class="tiny" id="saveHint" style="cursor:pointer">〔 存档 · 重开江湖 〕</span></div>
  </div>

  <!-- ===== 通用二级页容器(战斗/门派/奇遇等注入这里) ===== -->
  <div class="scene" id="sub">
    <div id="subContent"></div>
  </div>

</div>
<div id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rand=arr=>arr[Math.floor(Math.random()*arr.length)];
const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
let toastT=null;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),1800); }
function goScene(id){ document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on')); $('#'+id).classList.add('on'); window.scrollTo(0,0); }

// ============ 数据定义 ============
const ORIGINS=[
  {id:'shijia', nm:'世家子弟', tag:'家学渊源，初始银两丰厚', av:'🎎', bonus:{silver:200, root:2}},
  {id:'guer',   nm:'孤儿', tag:'流落江湖，身法机敏', av:'🥷', bonus:{agi:3}},
  {id:'youyi',  nm:'游方郎中', tag:'略通医理，气血更盛', av:'🧑‍⚕️', bonus:{hp:20}},
  {id:'taofan', nm:'逃犯', tag:'亡命之徒，攻伐凌厉', av:'🗡️', bonus:{atk:3}},
];
const TALENTS=[
  {id:'gang', nm:'刚猛', tag:'主攻·力大招沉', dist:{atk:4,root:2,agi:1,def:2,luck:1}},
  {id:'rou',  nm:'柔化', tag:'主守·以柔克刚', dist:{def:4,root:3,atk:1,agi:1,luck:1}},
  {id:'ling', nm:'灵巧', tag:'主身法·闪转腾挪', dist:{agi:4,luck:2,atk:2,def:1,root:1}},
  {id:'qi',   nm:'气宗', tag:'主内力·后劲绵长', dist:{root:4,def:2,atk:1,agi:1,luck:2}},
];
// 五维: 力(atk) 身法(agi) 内力(root) 根骨(def) 机缘(luck)
const WUXING=[['atk','力'],['agi','身法'],['root','内力'],['def','根骨'],['luck','机缘']];

// 八大系统入口(部分先占位, 后续批次填充)
const MENUS=[
  {id:'fight',  ic:'⚔️', nm:'历练',  tag:'寻人过招·练招式'},
  {id:'sect',   ic:'🏯', nm:'门派',  tag:'拜师·门派武学'},
  {id:'skill',  ic:'📜', nm:'武学',  tag:'招式·秘籍'},
  {id:'adventure',ic:'🎐',nm:'奇遇', tag:'江湖际遇'},
  {id:'dungeon',ic:'🏔️', nm:'副本',  tag:'闯关·稀有掉落'},
  {id:'work',   ic:'⚒️', nm:'营生',  tag:'采药打铁跑镖'},
  {id:'arena',  ic:'🏆', nm:'论剑',  tag:'江湖榜·切磋'},
  {id:'story',  ic:'🪷', nm:'际遇',  tag:'你的江湖纪事'},
];

// ============ 存档 ============
const SAVE_KEY='jianghu_save_v1';
let G=null;   // 全局游戏状态
function defaultState(){
  return {
    name:'无名', origin:null, talent:null, av:'🧑',
    lv:1, exp:0, title:'', sect:null, rep:0,
    hp:100, hpMax:100, mp:60, mpMax:60,
    stats:{atk:5, agi:5, root:5, def:5, luck:5},
    silver:50,
    skills:['pingzhang','roujin','shenxing','yungong','gedang'],   // 初始三系基础招+运功+格挡, 一入门就能见招拆招
    equip:{},
    log:[],                 // 江湖纪事
    flags:{},
    createdAt:Date.now(),
  };
}
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(G)); }catch(e){} }
function load(){ try{ const s=localStorage.getItem(SAVE_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function hasSave(){ return !!load(); }
function addLog(txt){ if(!G) return; G.log.unshift({t:Date.now(), txt}); if(G.log.length>60) G.log.pop(); save(); }

// ============ 入场 ============
function initEnter(){
  $('#continueBtn').style.display = hasSave() ? '' : 'none';
}
$('#startBtn').onclick=()=>{ openCreate(); };
$('#continueBtn').onclick=()=>{ G=load(); if(!G){ toast('存档已失'); return; } enterHome(); };

// ============ 角色创建 ============
let cSel={origin:null, talent:null};
function openCreate(){
  cSel={origin:null, talent:null};
  $('#nameIpt').value='';
  $('#originGrid').innerHTML=ORIGINS.map(o=>`<div class="opt" data-origin="${o.id}"><div class="o-nm">${o.av} ${o.nm}</div><div class="o-tag">${o.tag}</div></div>`).join('');

// ============================================================
//  武学系统: 招式库
//  sys: gang(刚,攻)/rou(柔,守)/ling(灵,身法) 三系相克: gang>rou>ling>gang
//  kind: attack普攻 / special绝招 / charge蓄力 / guard格挡
// ============================================================
const SKILLS={
  // —— 基础三招(初始+通用) ——
  pingzhang:{nm:'平常招', sys:'gang', kind:'attack', mp:0, pow:1.0, desc:'最朴实的一击，不耗内力'},
  roujin:   {nm:'柔劲', sys:'rou', kind:'attack', mp:4, pow:1.0, desc:'以柔劲卸力反打'},
  shenxing: {nm:'身法击', sys:'ling', kind:'attack', mp:4, pow:1.0, desc:'借身法欺身近击'},
  yungong:  {nm:'运功', sys:'none', kind:'charge', mp:0, pow:0, desc:'回内力，下招威力翻倍'},
  gedang:   {nm:'格挡', sys:'none', kind:'guard', mp:2, pow:0, desc:'大幅减伤，但易被身法破防'},
  // —— 门派/奇遇/副本习得(后续系统解锁) ——
  kuangfeng:{nm:'狂风刀法', sys:'gang', kind:'attack', mp:10, pow:1.6, desc:'刚猛霸道，破守极佳'},
  taiji:    {nm:'太极劲', sys:'rou', kind:'attack', mp:10, pow:1.6, desc:'四两拨千斤，化解身法'},
  lingbo:   {nm:'凌波微步', sys:'ling', kind:'attack', mp:10, pow:1.6, desc:'飘忽如影，专克刚猛'},
  // —— 绝招(高耗·相克成功时爆发) ——
  jiuyin:   {nm:'九阴白骨爪', sys:'gang', kind:'special', mp:24, pow:2.6, desc:'绝招·相克命中伤害暴涨'},
  liuyun:   {nm:'流云飞袖', sys:'rou', kind:'special', mp:24, pow:2.6, desc:'绝招·柔中带杀'},
  wandu:    {nm:'万剑归宗', sys:'ling', kind:'special', mp:26, pow:2.8, desc:'绝招·剑气纵横'},
};
const SYS_LABEL={gang:'刚',rou:'柔',ling:'灵',none:'—',special:'绝'};
const SYS_CLS={gang:'sys-gang',rou:'sys-rou',ling:'sys-ling'};
// 相克: 返回 1(克制/占优) / 0(平) / -1(被克)
function sysWin(a,b){
  if(a===b||a==='none'||b==='none') return 0;
  const beat={gang:'rou',rou:'ling',ling:'gang'};
  if(beat[a]===b) return 1;
  if(beat[b]===a) return -1;
  return 0;
}

// ============================================================
//  战斗引擎
// ============================================================
let BT=null;   // 当前战斗状态
function makeFighter(cfg){
  return { name:cfg.name, av:cfg.av||'🧑', lv:cfg.lv||1,
    hp:cfg.hp, hpMax:cfg.hp, mp:cfg.mp, mpMax:cfg.mp,
    atk:cfg.atk, def:cfg.def, agi:cfg.agi,
    stance:0, stanceMax:100,           // 架势(破防)条: 满则被处决重击
    charged:false, guarding:false,
    skills:cfg.skills, isFoe:!!cfg.isFoe, ai:cfg.ai||'balance' };
}
// 从玩家 G 造战斗单位
function playerFighter(){
  return makeFighter({ name:G.name, av:G.av, lv:G.lv, hp:G.hpMax, mp:G.mpMax,
    atk:8+G.stats.atk*2, def:6+G.stats.def*1.5, agi:5+G.stats.agi*1.6,
    skills:G.skills.slice() });
}
// 开战: foe = {name,av,lv,hp,mp,atk,def,agi,skills,ai, onWin, onLose, intro}
function startBattle(foe){
  const you=playerFighter();
  you.hp=G.hp; you.mp=G.mp;   // 沿用当前气血内力(疗伤后满)
  const enemy=makeFighter({...foe, isFoe:true});
  BT={ you, enemy, turn:0, combo:0, over:false, foeCfg:foe, log:[] };
  // 敌人本回合意图(先定, 供玩家参考——增策略)
  decideFoeMove();
  renderBattle(foe.intro || `${enemy.name} 拦住了去路！`);
  goScene('sub');
}
function pushBLog(html){ BT.log.unshift(html); if(BT.log.length>8) BT.log.pop(); }

function renderBattle(topMsg){
  const {you,enemy}=BT;
  const bar=(cls,cur,max,txt)=>`<div class="bar ${cls}"><i style="width:${clamp(cur/max*100,0,100)}%"></i><span class="bar-txt">${txt||''}</span></div>`;
  const cbHtml=(f,who)=>`
    <div class="combatant" id="cb-${who}">
      <div class="cb-top"><div class="cb-av">${f.av}</div>
        <div class="cb-nm">${esc(f.name)}<span class="lv">第${f.lv}重</span></div>
        ${who==='enemy'?`<div class="cb-intent" id="foeIntent"></div>`:''}
      </div>
      ${bar('bar-hp',f.hp,f.hpMax,`气血 ${Math.ceil(f.hp)}/${f.hpMax}`)}
      ${bar('bar-mp',f.mp,f.mpMax,'')}
      <div class="stance-label">架势 ${Math.round(f.stance)}%</div>
      ${bar('bar-stance',f.stance,f.stanceMax,'')}
    </div>`;
  const movesHtml=you.skills.map(sid=>{
    const s=SKILLS[sid]; if(!s) return '';
    const can=you.mp>=s.mp;
    const sysTag=s.kind==='special'?'sys-special':(SYS_CLS[s.sys]||'');
    const label=s.kind==='special'?'绝':SYS_LABEL[s.sys];
    return `<div class="move ${can?'':'disabled'}" data-skill="${sid}">
      <div class="mv-nm">${s.nm}${label!=='—'?`<span class="mv-sys ${sysTag}">${label}</span>`:''}</div>
      ${s.mp?`<span class="mv-cost">${s.mp}内力</span>`:''}
      <div class="mv-desc">${s.desc}</div></div>`;
  }).join('');
  const logHtml=BT.log.map(l=>l).join('<br>')||'<span class="tiny">出招见招拆招…</span>';
  openSub(`<div class="battle">
    <div class="page-head"><span class="back" id="btFlee">‹</span><h2>过招${BT.combo>1?`<span class="combo-tag on">连击 ×${BT.combo}</span>`:''}</h2></div>
    ${topMsg?`<div class="narrate">${topMsg}</div>`:''}
    ${cbHtml(enemy,'enemy')}
    ${cbHtml(you,'you')}
    <div class="battle-log" id="btLog">${logHtml}</div>
    <div class="moves" id="btMoves">${movesHtml}</div>
  </div>`);
  updateFoeIntent();
  $('#btFlee').onclick=()=>tryFlee();
  $('#btMoves').querySelectorAll('.move:not(.disabled)').forEach(el=>el.onclick=()=>playerMove(el.dataset.skill));
}
function updateFoeIntent(){
  const el=$('#foeIntent'); if(!el||!BT.foeNext) return;
  const s=SKILLS[BT.foeNext]; if(!s) return;
  const hint={attack:'欲攻',special:'蓄势待发！',charge:'正在运功',guard:'凝神防守'}[s.kind]||'';
  el.textContent='● '+hint;
}
// 敌人 AI 决定下一招
function decideFoeMove(){
  const {enemy,you}=BT;
  const usable=enemy.skills.filter(sid=>SKILLS[sid] && enemy.mp>=SKILLS[sid].mp);
  let pick;
  // 残血/内力足 → 倾向绝招; 内力低 → 运功; 否则按 ai 风格
  const specials=usable.filter(s=>SKILLS[s].kind==='special');
  if(specials.length && enemy.mp>=24 && Math.random()<0.4) pick=rand(specials);
  else if(enemy.mp<8 && enemy.skills.includes('yungong') && Math.random()<0.6) pick='yungong';
  else{
    const atks=usable.filter(s=>SKILLS[s].kind==='attack');
    pick = atks.length?rand(atks):(usable[0]||'pingzhang');
  }
  BT.foeNext=pick;
}

// 玩家出招 → 结算本回合(双方同时出)
function playerMove(sid){
  if(BT.over) return;
  const {you,enemy}=BT;
  const ys=SKILLS[sid]; if(!ys || you.mp<ys.mp){ toast('内力不足'); return; }
  const foeSid=BT.foeNext, fs=SKILLS[foeSid]||SKILLS.pingzhang;
  BT.turn++;
  // 扣内力
  you.mp-=ys.mp; enemy.mp-=fs.mp;
  // 重置上回合临时态
  you.guarding=(ys.kind==='guard'); enemy.guarding=(fs.kind==='guard');
  let lines=[];

  // 处理蓄力/格挡(非攻击招)
  const yAtk=(ys.kind==='attack'||ys.kind==='special');
  const fAtk=(fs.kind==='attack'||fs.kind==='special');
  if(ys.kind==='charge'){ you.mp=clamp(you.mp+18,0,you.mpMax); you.charged=true; lines.push(`<span class="bl-you">你运功调息，内力回涌，下一招将威力大增。</span>`); }
  if(fs.kind==='charge'){ enemy.mp=clamp(enemy.mp+18,0,enemy.mpMax); enemy.charged=true; lines.push(`<span class="bl-foe">${enemy.name}凝气蓄势…</span>`); }

  // 双方攻击结算
  if(yAtk){ const r=resolveHit(you,enemy,ys,fs,'you'); lines.push(r); }
  if(fAtk && enemy.hp>0){ const r=resolveHit(enemy,you,fs,ys,'foe'); lines.push(r); }

  // 消耗蓄力
  if(yAtk) you.charged=false;
  if(fAtk) enemy.charged=false;

  lines.forEach(l=>pushBLog(l));
  // 判定胜负
  if(enemy.hp<=0){ return endBattle(true); }
  if(you.hp<=0){ return endBattle(false); }
  // 敌人定下回合意图
  decideFoeMove();
  // 重渲染 + 受击动画
  renderBattle('');
  animateHits(yAtk, fAtk);
  syncPlayerFromBattle();
}
// 单次攻击结算: attacker 用 aSkill 打 defender(defender本回合用 dSkill)
function resolveHit(attacker,defender,aSkill,dSkill,side){
  const cls=side==='you'?'bl-you':'bl-foe';
  const nm=attacker.name, dnm=defender.name;
  // 基础伤害
  let dmg = attacker.atk * aSkill.pow;
  // 蓄力翻倍
  if(attacker.charged) dmg*=2;
  // 相克
  const rel=sysWin(aSkill.sys, dSkill.sys);
  let critMark='', breakMark='';
  if(rel>0){ dmg*=1.6; critMark=' 破！'; }        // 克制
  else if(rel<0){ dmg*=0.6; }                     // 被克
  // 防御减免(格挡额外减)
  let red = defender.def*0.5;
  if(defender.guarding){ red += defender.def*1.2; }
  // 身法招破格挡: 攻方 ling 且守方 guard → 破防
  if(defender.guarding && aSkill.sys==='ling'){ red*=0.2; breakMark=' 身法破防！'; }
  dmg = Math.max(3, dmg-red);
  // 绝招+克制 → 暴击
  let isCrit=false;
  if(aSkill.kind==='special' && rel>=0){ dmg*=1.35; isCrit=true; }
  // 残血背水一战(攻方hp<25%)
  if(attacker.hp < attacker.hpMax*0.25){ dmg*=1.2; }
  dmg=Math.round(dmg);
  defender.hp=clamp(defender.hp-dmg,0,defender.hpMax);
  // 架势累积: 被克/被绝招 涨架势; 满则下次受创加重
  defender.stance=clamp(defender.stance + (rel<0?8:16) + (isCrit?14:0), 0, defender.stanceMax);
  let execMark='';
  if(defender.stance>=defender.stanceMax){ defender.stance=0; const extra=Math.round(defender.hpMax*0.12); defender.hp=clamp(defender.hp-extra,0,defender.hpMax); execMark=`（架势崩溃，追加${extra}！）`; }
  // combo
  if(side==='you'){ if(rel>0){ BT.combo++; } else { BT.combo=0; } }
  // 特效
  if(side==='you'){ if(isCrit||rel>0) fxWord(aSkill.kind==='special'?aSkill.nm:'破'); if(rel>0||isCrit) fxSlash(); }
  const critCls=isCrit?'bl-crit':(rel>0?'bl-break':'');
  return `<span class="${cls}">${side==='you'?'你':nm}施展<b>${aSkill.nm}</b>，`
    + `<span class="${critCls}">${critMark||breakMark||''}</span>`
    + `${isCrit?'绝招爆发，':''}对${side==='you'?nm:'你'}造成 <b>${dmg}</b> 伤害${execMark}</span>`;
}
function syncPlayerFromBattle(){ G.hp=Math.round(BT.you.hp); G.mp=Math.round(BT.you.mp); save(); }
function animateHits(youAtk,foeAtk){
  if(youAtk){ const c=$('#cb-enemy'); if(c){ c.classList.add('hurt'); setTimeout(()=>c.classList.remove('hurt'),300);} }
  if(foeAtk){ const c=$('#cb-you'); if(c){ c.classList.add('hurt'); setTimeout(()=>c.classList.remove('hurt'),300);} document.querySelector('.wrap').classList.add('shake'); setTimeout(()=>document.querySelector('.wrap').classList.remove('shake'),300); }
}
// 逃跑
function tryFlee(){
  if(BT.over) return;
  if(Math.random()<0.5){ toast('你抽身退走，暂避锋芒。'); BT.over=true; syncPlayerFromBattle(); backHome(); }
  else{ pushBLog('<span class="bl-foe">逃跑失败！对方欺身而上。</span>'); const {you,enemy}=BT; const fs=SKILLS[BT.foeNext]||SKILLS.pingzhang; if(fs.kind==='attack'||fs.kind==='special'){ resolveHit(enemy,you,fs,SKILLS.pingzhang,'foe'); } decideFoeMove(); if(you.hp<=0) return endBattle(false); renderBattle(''); syncPlayerFromBattle(); }
}
// 结束
function endBattle(win){
  BT.over=true;
  const foe=BT.foeCfg;
  syncPlayerFromBattle();
  if(win){
    const exp=foe.exp||(foe.lv*12), silver=foe.silver||rnd(foe.lv*5,foe.lv*15);
    G.exp+=exp; G.silver+=silver;
    let up=[]; while(G.exp>=G.lv*50){ G.exp-=G.lv*50; G.lv++; recalcDerived(); G.hp=G.hpMax; G.mp=G.mpMax; up.push(G.lv); }
    addLog(`你击败了${foe.name}，得经验${exp}、银两${silver}。`);
    let dropHtml='';
    if(foe.drop && Math.random()<(foe.dropRate||0.5)){ dropHtml=grantSkill(foe.drop); }
    save();
    openSub(`<div class="battle-end win">
      <div class="be-title">胜</div>
      <div class="narrate">${foe.winText||`一番苦斗，${foe.name}败下阵来。`}</div>
      <div class="mt">经验 <b style="color:var(--red)">+${exp}</b> · 银两 <b style="color:var(--red)">+${silver}</b></div>
      ${up.length?`<div class="mt tiny">修为精进！已至第 ${G.lv} 重</div>`:''}
      ${dropHtml}
      <button class="btn primary wide mt2" onclick="backHome()">收 势</button>
    </div>`);
    if(typeof foe.onWin==='function'){ try{foe.onWin();}catch(e){} }
  } else {
    G.hp=Math.max(1,Math.round(G.hpMax*0.15));  // 败而不死, 留一线
    addLog(`你败于${foe.name}之手，负伤退走。`);
    save();
    openSub(`<div class="battle-end lose">
      <div class="be-title">败</div>
      <div class="narrate">${foe.loseText||`技不如人，你负伤退走，暗自记下这一败。`}</div>
      <div class="mt tiny">气血仅余 ${G.hp}，去客栈疗伤或营生调养吧。</div>
      <button class="btn wide mt2" onclick="backHome()">忍 痛 退 走</button>
    </div>`);
    if(typeof foe.onLose==='function'){ try{foe.onLose();}catch(e){} }
  }
}
// 习得招式
function grantSkill(sid){
  if(!SKILLS[sid]) return '';
  if(G.skills.includes(sid)) return `<div class="mt tiny">（${SKILLS[sid].nm} 已在你的武学中）</div>`;
  G.skills.push(sid); save();
  return `<div class="mt" style="color:var(--gold);font-weight:700">✦ 习得武学：${SKILLS[sid].nm}！</div>`;
}

// 全屏特效
function fxWord(w){ let fx=$('#fx'); if(!fx){ fx=document.createElement('div'); fx.id='fx'; document.body.appendChild(fx); }
  const el=document.createElement('div'); el.className='fx-word'; el.textContent=w; fx.innerHTML=''; fx.appendChild(el);
  void el.offsetWidth; el.classList.add('go'); setTimeout(()=>{ if(el.parentNode)el.remove(); },750); }
function fxSlash(){ let fx=$('#fx'); if(!fx){ fx=document.createElement('div'); fx.id='fx'; document.body.appendChild(fx); }
  const el=document.createElement('div'); el.className='fx-slash'; fx.appendChild(el); void el.offsetWidth; el.classList.add('go'); setTimeout(()=>{ if(el.parentNode)el.remove(); },350); }

// ============ 历练系统(打斗入口): 遇到随机对手 ============
const FOE_POOL=[
  {name:'山贼', av:'🥷', lvOff:0, skills:['pingzhang','gedang'], ai:'balance', winText:'山贼抱头鼠窜，丢下几两碎银。'},
  {name:'镖师', av:'💪', lvOff:1, skills:['pingzhang','roujin','gedang'], ai:'guard', winText:'镖师拱手：「阁下好身手。」'},
  {name:'流浪剑客', av:'🗡️', lvOff:1, skills:['shenxing','lingbo','yungong'], ai:'agi', drop:'lingbo', dropRate:0.3, winText:'剑客收剑入鞘，飘然而去。'},
  {name:'恶霸', av:'👹', lvOff:2, skills:['pingzhang','kuangfeng','yungong'], ai:'aggro', drop:'kuangfeng', dropRate:0.25},
  {name:'蒙面客', av:'🎭', lvOff:2, skills:['roujin','taiji','gedang','yungong'], ai:'balance', drop:'taiji', dropRate:0.25},

function spawnFoe(){
  const t=rand(FOE_POOL);
  const lv=Math.max(1,G.lv+(t.lvOff||0)+rnd(-1,1));
  return {
    name:t.name, av:t.av, lv,
    hp:60+lv*22, mp:30+lv*8,
    atk:6+lv*2.2, def:4+lv*1.6, agi:4+lv*1.4,
    skills:t.skills, ai:t.ai,
    exp:lv*12, silver:rnd(lv*4,lv*14),
    drop:t.drop, dropRate:t.dropRate,
    winText:t.winText, intro:`${t.av} <span class="who">${t.name}</span> 挡在你面前，摆开架势！`,
  };
}

// ============ 注册系统入口 ============
window.JH_SYS = window.JH_SYS || {};
window.JH_SYS.fight = function(){
  if(G.hp < G.hpMax*0.2){ toast('气血过低，先去疗伤或调养'); return; }
  startBattle(spawnFoe());
};
window.JH_SYS.skill = function(){
  const list=G.skills.map(sid=>{ const s=SKILLS[sid]; if(!s) return ''; const label=s.kind==='special'?'绝':SYS_LABEL[s.sys];
    const sysTag=s.kind==='special'?'sys-special':(SYS_CLS[s.sys]||'');
    return `<div class="move" style="cursor:default"><div class="mv-nm">${s.nm}${label!=='—'?`<span class="mv-sys ${sysTag}">${label}</span>`:''}</div>${s.mp?`<span class="mv-cost">${s.mp}内力</span>`:''}<div class="mv-desc">${s.desc}</div></div>`;
  }).join('');
  openSub(`<div class="page-head"><span class="back" onclick="backHome()">‹</span><h2>武学</h2></div>
    <div class="tiny center" style="margin-bottom:10px">三系相克：刚 ⊳ 柔 ⊳ 灵 ⊳ 刚。见招拆招，克制则伤害暴涨。</div>
    <div class="moves">${list}</div>
    <div class="tiny center mt2">招式可从门派、奇遇、副本习得。</div>`);
};

// ============ 启动 ============
initEnter();
</script>
</body>
</html>
